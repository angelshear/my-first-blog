{% extends 'blog/base.html' %}

{% block content %}

    <h1 class="text-center page-title">{{ title }}</h1>

    <form method="POST"
          class="post-form"
          enctype="multipart/form-data">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="main-comment-submit">
            {% if post %}
                Сохранить изменения
            {% else %}
                Создать пост
            {% endif %}
        </button>

    </form>

{% endblock %}
