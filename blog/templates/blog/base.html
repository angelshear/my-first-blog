{% load static %}

<!DOCTYPE html>

<html lang="ru">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>Django Blog</title>

    <!-- Bootstrap -->

    <link rel="stylesheet"
          href="//maxcdn.bootstrapcdn.com/bootstrap/3.2.0/css/bootstrap.min.css">

    <link rel="stylesheet"
          href="//maxcdn.bootstrapcdn.com/bootstrap/3.2.0/css/bootstrap-theme.min.css">

    <!-- Google Fonts -->

    <link href='//fonts.googleapis.com/css?family=Lobster&subset=latin,latin-ext'
          rel='stylesheet'
          type='text/css'>

    <!-- Icons -->

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Custom CSS -->
    
    <link rel="stylesheet"
          href="{% static 'css/blog.css' %}">

</head>

<body>

<!-- HEADER -->

<div class="page-header">

    <!-- ЛОГО -->

    <div class="header-logo">
        <a href="/">
            Django Girls Blog
        </a>
    </div>

    <!-- ПОИСК -->

    <div class="header-search">

        <form method="GET"
              action="{% url 'post_list' %}">

            <input type="text"
                   name="q"
                   placeholder="Поиск..."
                   value="{{ request.GET.q }}">

            <button type="submit">
                <i class="bi bi-search"></i>
            </button>

        </form>

    </div>

    <!-- МЕНЮ -->

    <div class="header-menu">

        {% if user.is_authenticated %}

            <span class="top-menu">
                Hello, {{ user.username }}
            </span>

            <a href="{% url 'post_new' %}"
               class="top-menu">
                <i class="bi bi-plus-lg"></i>
            </a>

            <a href="{% url 'logout' %}"
               class="top-menu">
                Logout
            </a>

        {% else %}

            <a href="{% url 'login' %}"
               class="top-menu">
                Login
            </a>

            <a href="{% url 'register' %}"
               class="top-menu">
                Register
            </a>

        {% endif %}

    </div>

</div>

<!-- MAIN CONTENT -->

<div class="content container">

    <div class="row">

        <div class="col-md-8 col-md-offset-2">

            <!-- DJANGO MESSAGES -->

            {% if messages %}

                {% for message in messages %}

                    <div class="alert alert-info">

                        {{ message }}

                    </div>

                {% endfor %}

            {% endif %}

            <!-- PAGE CONTENT -->

            {% block content %}
            {% endblock %}

        </div>

    </div>

</div>

<!-- Bootstrap JS -->

<script src="https://code.jquery.com/jquery-1.11.1.min.js"></script>

<script src="//maxcdn.bootstrapcdn.com/bootstrap/3.2.0/js/bootstrap.min.js"></script>

<!-- BLOG JS -->

<script src="{% static 'blog/js/core/csrf.js' %}"></script>

<script src="{% static 'blog/js/comments/comment_core.js' %}"></script>

<script src="{% static 'blog/js/ui/sort_menu.js' %}"></script>

<script src="{% static 'blog/js/posts/post.js' %}"></script>

</body>

</html>
