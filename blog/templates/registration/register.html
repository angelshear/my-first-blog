{% extends 'blog/base.html' %}

{% block content %}

    <div class="auth-container">

        <div class="auth-card">

            <h2 class="auth-title">
                Регистрация
            </h2>

            <form method="post" class="auth-form">

                {% csrf_token %}

                {{ form.as_p }}

                <div class="auth-actions">

                    <button type="submit"
                            class="action-btn">

                        Зарегистрироваться

                    </button>

                </div>

            </form>

        </div>

    </div>

{% endblock %}
